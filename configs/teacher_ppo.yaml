# ==========================================
# CURRICULUM STAGES
# ==========================================
# Stage 0: Hover      — stable hover at [0,0,2]. Flight foundation.
# Stage 1: Scout      — 1 coin at random angle 2m away. First navigation.
#                       cos²(θ) alignment gate forces face-first approach.
# Stage 2: Navigator  — 4 fixed coins in a ring. Sequential navigation.
# Stage 3: Hunter     — 10-18 random coins at Z≈2m. Generalize XY search.
# Stage 4: Pathfinder — 20 fixed obstacles + 4 fixed coins. Obstacle avoidance.
# Stage 5: Pioneer    — 20 fixed obstacles + random coins. Avoidance + search.
# Stage 6: Apex       — 20 random obstacles + random coins. Full mastery.
#
# Stage advancement criteria (enforced by ConsecutiveThresholdCallback):
#   - threshold must be exceeded in 3 CONSECUTIVE evals
#   - max 1 early crash per eval (episode terminating < 1000 steps with neg reward)
#
# Per-stage parameters:
#   max_steps        — episode length in physics steps (240Hz)
#   total_timesteps  — training budget
#   coin_count_range — [min, max] coins when randomize_coins=True
#   coin_z_range     — [z_min, z_max] for random coin Z placement
# ==========================================
stages:
  stage_0:
    run_name: "Stage_0_Hover_v8"
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: True
    num_fixed_coins: 0
    fixed_spawn: True
    max_steps: 3600
    total_timesteps: 1000000  # hover already solved in seed — only yaw needs learning
    reward_threshold: 8500    # v5 hover ~6200 + yaw_w=1.0*cos<50° → forces genuine alignment
    seed_weights_from: "Stage_0_Hover_v5"  # load weights+vecnorm from v5, reset compass dims

  stage_1:
    run_name: "Stage_1_Scout_v3"
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 1
    coin_spawn_radius: 2.0    # random angle each episode, fixed 2m radius
    max_steps: 7200           # 30s
    total_timesteps: 2000000
    reward_threshold: 1800.0  # cos²(θ) gate: aligned collect ~1700+ pts; lateral slide ~0 progress

  stage_2:
    run_name: "Stage_2_Navigator_v5"
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 4
    max_steps: 10800          # 45s — ~26s minimum path for 4-coin ring
    total_timesteps: 10000000
    reward_threshold: 2500.0

  stage_3:
    run_name: "Stage_3_Hunter_v2"
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4        # unused when randomize_coins=True
    max_steps: 10800
    total_timesteps: 10000000
    reward_threshold: 2000.0
    coin_count_range: [10, 18]
    coin_z_range: [1.5, 2.5]  # constrained to Z≈2m — XY generalization only

  stage_4:
    run_name: "Stage_4_Pathfinder_v1"
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 4
    max_steps: 14400          # 60s — obstacles slow navigation
    total_timesteps: 10000000
    reward_threshold: 1500.0

  stage_5:
    run_name: "Stage_5_Pioneer_v1"
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    max_steps: 14400
    total_timesteps: 10000000
    reward_threshold: 2000.0
    coin_count_range: [10, 18]
    coin_z_range: [1.5, 2.5]

  stage_6:
    run_name: "Stage_6_Apex_v1"
    num_obstacles: 20
    randomize_obstacles: True
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    max_steps: 14400
    total_timesteps: 10000000
    reward_threshold: 2000.0
    coin_count_range: [10, 18]
    coin_z_range: [1.5, 4.0]  # Apex: wider Z range for full 3D navigation

# ==========================================
# HOVER REWARDS (Stage 0 only)
# ==========================================
hover_rewards:
  hover_target: [0.0, 0.0, 2.0]
  tilt_penalty: 0.27
  angular_velocity_penalty: 0.05
  smoothness_penalty: 0.05
  collision_penalty: 50.0
  hover_yaw_weight: 1.0       # face a random direction while hovering — activates dormant action[2]

# ==========================================
# NAV REWARDS (Stage 1+)
#
# progress_uses_alignment: true — multiplies ALL progress reward by cos²(θ).
#   Lateral slide (θ=90°) → 0 progress reward. No zero-gradient trap (continuous).
#   This forces face-first approach without a separate yaw-alignment stage.
# progress_reward_weight: 150 — overcomes hover deceleration prior (10M Stage 0
#   steps baked "near target = slow" into weights; 3× stronger signal overrides it).
# yaw_alignment_weight: 0.10 — small, always-active (NOT progress-gated).
#   Always fires so drone has turning gradient during pure rotation (coin_progress=0).
# ==========================================
nav_rewards:
  progress_reward_weight: 150.0          # 50→150: overcome hover deceleration prior
  progress_uses_alignment: true          # cos²(θ) gate — lateral slide earns 0
  approach_bonus_weight: 150.0
  approach_bonus_dist: 1.5
  yaw_alignment_weight: 0.10             # small, always-active (no stalling, turning gradient)
  yaw_alignment_dist: 5.0               # covers full approach at any stage distance
  velocity_direction_weight: 0.20
  smoothness_penalty_multiplier: 0.03
  lidar_penalty_multiplier: 0.5
  coin_collection_reward: 300.0
  success_bonus: 1000.0
  collision_penalty: 300.0
  # FOV masking: coin compass zeroed when outside ±fov_half_degrees.
  # search_rotation_reward: only non-zero gradient when compass=zeros, forces action[2] discovery.
  fov_half_degrees: 60                   # ±60° = 120° total (typical wide-angle drone camera)
  search_rotation_reward: 0.03          # rewards |yaw_rate| when coin outside FOV
