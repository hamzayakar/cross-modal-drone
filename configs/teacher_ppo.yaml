# ==========================================
# CURRICULUM STAGES
# ==========================================
# Stage 0: Hover      — survive + hold Z=2.0. No coins. Flight foundation.
# Stage 1: Scout      — 1 fixed coin 1m away. Basic compass following.
# Stage 2: Navigator  — 4 fixed coins. Sequential navigation.
# Stage 3: Hunter     — 10-18 random coins, no obstacles. Generalize search.
# Stage 4: Pathfinder — 20 fixed obstacles + 4 fixed coins. Learn obstacle
#                       avoidance with familiar coin locations (one new skill).
# Stage 5: Pioneer    — 20 fixed obstacles + random coins. Combine avoidance+search.
# Stage 6: Apex       — 20 random obstacles + random coins. Full mastery.
# ==========================================
stages:
  stage_0:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: True
    num_fixed_coins: 0
    fixed_spawn: True
    reward_threshold: 500.0
    run_name: "Stage_0_Hover"

  stage_1:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 1
    reward_threshold: 600.0
    run_name: "Stage_1_Scout"

  stage_2:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 1500.0
    run_name: "Stage_2_Navigator"

  stage_3:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 2000.0
    run_name: "Stage_3_Hunter"

  stage_4:
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 1500.0
    run_name: "Stage_4_Pathfinder"

  stage_5:
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 2000.0
    run_name: "Stage_5_Pioneer"

  stage_6:
    num_obstacles: 20
    randomize_obstacles: True
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 2000.0
    run_name: "Stage_6_Apex"

# ==========================================
# HOVER REWARDS (Stage 0 only)
# Goal: reach and hold hover_target [0, 0, 2.0].
# Compass in obs always points to hover_target — same ego-centric structure
# as nav stages (where target = nearest coin). Policy learns one skill:
# "minimize the compass vector." In hover target is fixed; in nav it shifts
# as coins are collected. No velocity_penalty: physics drag + tilt penalty
# provide natural damping without biasing Stage 1+ toward slow movement.
# ==========================================
hover_rewards:
  alive_bonus: 0.1
  hover_target: [0.0, 0.0, 2.0]
  distance_penalty: 0.5
  tilt_penalty: 0.5
  angular_velocity_penalty: 0.05
  collision_penalty: 50.0

# ==========================================
# NAV REWARDS (Stage 1+)
# ==========================================
nav_rewards:
  alive_bonus: 0.02
  distance_penalty_multiplier: 0.02
  velocity_penalty_multiplier: 0.0
  smoothness_penalty_multiplier: 0.02
  lidar_penalty_multiplier: 0.5
  coin_collection_reward: 300.0
  success_bonus: 1000.0
  collision_penalty: 300.0
