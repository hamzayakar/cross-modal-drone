# ==========================================
# CURRICULUM STAGES
# ==========================================
# Stage 0: Hover — learn to survive, hold altitude, minimize movement.
#          No coins. Foundation for all future stages.
# Stage 1: Scout — single fixed coin 1m away. Learn basic directional thrust.
# Stage 2: Navigator — 4 fixed coins, increasing distance. Learn sequential nav.
# Stage 3: Hunter — 10-18 random coins, empty room. Generalize navigation.
# Stage 4: Pioneer — 20 fixed obstacles + random coins. Learn obstacle avoidance.
# Stage 5: Apex — 20 random obstacles + random coins. Full mastery.
# ==========================================
stages:
  stage_0:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: True
    num_fixed_coins: 0
    reward_threshold: 800.0
    run_name: "Stage_0_Hover"

  stage_1:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 1
    reward_threshold: 600.0
    run_name: "Stage_1_Scout"

  stage_2:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 1500.0
    run_name: "Stage_2_Navigator"

  stage_3:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 2000.0
    run_name: "Stage_3_Hunter"

  stage_4:
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 2000.0
    run_name: "Stage_4_Pioneer"

  stage_5:
    num_obstacles: 20
    randomize_obstacles: True
    randomize_coins: True
    hover_only: False
    num_fixed_coins: 4
    reward_threshold: 2000.0
    run_name: "Stage_5_Apex"

# ==========================================
# HOVER REWARDS (Stage 0 only)
# Goal: survive + hold Z=2.0 + minimize movement.
# No coins, no success bonus. Pure stability learning.
# ==========================================
hover_rewards:
  alive_bonus: 0.1
  altitude_target: 2.0
  altitude_penalty: 1.0
  tilt_penalty: 0.5
  velocity_penalty: 0.1
  angular_velocity_penalty: 0.05
  collision_penalty: 50.0

# ==========================================
# NAV REWARDS (Stage 1+)
# ==========================================
nav_rewards:
  alive_bonus: 0.02
  distance_penalty_multiplier: 0.02
  velocity_penalty_multiplier: 0.0
  smoothness_penalty_multiplier: 0.02
  lidar_penalty_multiplier: 0.5
  coin_collection_reward: 300.0
  success_bonus: 1000.0
  collision_penalty: 300.0
