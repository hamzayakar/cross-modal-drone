# ==========================================
# CURRICULUM STAGES (Cleaned & Streamlined)
# ==========================================
stages:
  stage_0:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: False
    run_name: "Stage_0_Hover_and_Navigate_gamma_fixed"
  stage_1:
    num_obstacles: 0
    randomize_obstacles: False
    randomize_coins: True
    run_name: "Stage_1_RandomCoins"
  stage_2:
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: False
    run_name: "Stage_2_FixedObs_FixedCoins"
  stage_3:
    num_obstacles: 20
    randomize_obstacles: False
    randomize_coins: True
    run_name: "Stage_3_FixedObs_RandomCoins"
  stage_4:
    num_obstacles: 20
    randomize_obstacles: True
    randomize_coins: True
    run_name: "Stage_4_Full_Autonomy"

# ==========================================
# REWARD WEIGHTS (Hunter Model)
# ==========================================
rewards:
  alive_bonus: 0.02
  distance_penalty_multiplier: 0.02
  velocity_penalty_multiplier: 0.003
  smoothness_penalty_multiplier: 0.05  # NEW: Punish erratic movements to encourage smoother trajectories
  lidar_penalty_multiplier: 0.5
  coin_collection_reward: 300.0
  success_bonus: 1000.0
  collision_penalty: 300.0